<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mi Página Personal</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      color: #333;
      margin: 0;
      padding: 0;
    }
    header {
      background-color: #4CAF50;
      color: white;
      padding: 20px;
      text-align: center;
    }
    section {
      margin: 20px;
      padding: 20px;
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    input, textarea, button {
      margin: 5px 0;
      padding: 8px;
      width: 100%;
    }
  </style>
</head>
<body>
  <header>
    <h1 id="saludo">Bienvenido a mi página personal</h1>
  </header>

  <section>
    <h2>Datos personales</h2>
    <input type="text" id="nombre" placeholder="Tu nombre">
    <input type="text" id="profesion" placeholder="Tu profesión">
    <textarea id="bio" placeholder="Escribe una breve biografía"></textarea>
    <button onclick="guardarPerfil()">Guardar Perfil</button>
  </section>

  <section>
    <h2>Mis hobbies</h2>
    <input type="text" id="hobby" placeholder="Agrega un hobby">
    <button onclick="guardarHobby()">Guardar Hobby</button>
    <ul id="listaHobbies"></ul>
  </section>

  <section>
    <h2>Contacto</h2>
    <input type="email" id="email" placeholder="Tu correo electrónico">
    <button onclick="guardarEmail()">Guardar Email</button>
    <p id="mostrarEmail"></p>
  </section>

  <script>
    // Guardar perfil
    function guardarPerfil() {
      localStorage.setItem("nombre", document.getElementById("nombre").value);
      localStorage.setItem("profesion", document.getElementById("profesion").value);
      localStorage.setItem("bio", document.getElementById("bio").value);
      actualizarPerfil();
    }

    function actualizarPerfil() {
      let nombre = localStorage.getItem("nombre");
      let profesion = localStorage.getItem("profesion");
      let bio = localStorage.getItem("bio");

      if (nombre) document.getElementById("saludo").innerText = "Bienvenido, " + nombre;
      if (profesion) document.getElementById("profesion").value = profesion;
      if (bio) document.getElementById("bio").value = bio;
    }

    // Guardar hobbies
    function guardarHobby() {
      let hobby = document.getElementById("hobby").value;
      if (hobby) {
        let hobbies = JSON.parse(localStorage.getItem("hobbies")) || [];
        hobbies.push(hobby);
        localStorage.setItem("hobbies", JSON.stringify(hobbies));
        mostrarHobbies();
        document.getElementById("hobby").value = "";
      }
    }

    function mostrarHobbies() {
      let hobbies = JSON.parse(localStorage.getItem("hobbies")) || [];
      let lista = document.getElementById("listaHobbies");
      lista.innerHTML = "";
      hobbies.forEach(h => {
        let li = document.createElement("li");
        li.textContent = h;
        lista.appendChild(li);
      });
    }

    // Guardar email
    function guardarEmail() {
      let email = document.getElementById("email").value;
      localStorage.setItem("email", email);
      document.getElementById("mostrarEmail").innerText = "Tu correo: " + email;
    }

    // Al cargar la página, recuperar datos
    window.onload = function() {
      actualizarPerfil();
      mostrarHobbies();
      let email = localStorage.getItem("email");
      if (email) {
        document.getElementById("email").value = email;
        document.getElementById("mostrarEmail").innerText = "Tu correo: " + email;
      }
    }
  </script>
</body>
</html>
